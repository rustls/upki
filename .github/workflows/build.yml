name: build

permissions:
  contents: read

on:
  push:
    branches: ["main", "rel-*", "ci/*"]
    tags:
      - "**"
  pull_request:
  merge_group:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
          - ubuntu-24.04-arm
        rustc:
          - stable
        include:
          - os: ubuntu-latest
            rustc: nightly
        exclude: # and never use macos/windows for merge checks
          - os: ${{ github.event_name == 'merge_group' && 'windows-latest' }}
          - os: ${{ github.event_name == 'merge_group' && 'macos-latest' }}

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: true
          persist-credentials: false

      - name: Install ${{ matrix.rustc }} toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rustc }}

      - name: Install cargo-c
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-c

      - name: Install OpenSSL (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append
          vcpkg install openssl:x64-windows-static-md

      - name: Build (debug)
        run: cargo build --locked
      - name: Run tests (debug)
        run: cargo test --locked

      - name: Build (release)
        run: cargo build --locked --release
      - name: Run tests (release)
        run: cargo test --locked --release

      - name: Build FFI
        run: cargo cbuild --locked --release -p upki
      - name: Build OpenSSL integration
        run: cargo cbuild --locked --release -p upki-openssl

      - name: Run system tests (release)
        run: cargo test --locked --release --test system_tests -- --ignored --nocapture

  ffi-example:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: true
          persist-credentials: false

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install cargo-c
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-c

      - name: Check upki/ffi-example builds
        run: |
            mkdir -p dist/ffi
            cargo cinstall -p upki --release --prefix=$(realpath dist/ffi)
            export PKG_CONFIG_PATH=$(realpath dist/ffi/lib/x86_64-linux-gnu/pkgconfig/)

            cd upki/ffi-example
            make
            ./upki-demo || true
            valgrind ./upki-demo || true

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: true
          persist-credentials: false

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"

      - name: Check MSRV
        run: cargo check --locked --all-features
